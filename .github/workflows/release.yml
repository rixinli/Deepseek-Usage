name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 2.2.0)'
        required: true
        default: '2.2.0'

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 构建 EXE 和便携版 ZIP
  # ═══════════════════════════════════════════════════════════════
  build-exe:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: |
          pip install pytest pytest-mock
          pytest tests/ -v --tb=short

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller DeepSeek_API_Monitor.spec

      - name: Verify EXE exists
        run: |
          if (Test-Path dist/DeepSeek_API_Monitor.exe) {
            Write-Host "✅ EXE built successfully ($((Get-Item dist/DeepSeek_API_Monitor.exe).Length) bytes)"
          } else {
            Write-Error "❌ EXE not found"
            exit 1
          }

      - name: Copy config template
        run: |
          if (-not (Test-Path deepseek_config.ini.example)) {
            Write-Error "❌ deepseek_config.ini.example not found in repo root"
            exit 1
          }
          Copy-Item deepseek_config.ini.example dist/deepseek_config.ini.example
          Write-Host "✅ Config template copied"

      - name: Create portable ZIP
        run: |
          $items = @("dist/DeepSeek_API_Monitor.exe", "dist/deepseek_config.ini.example")
          $missing = $items | Where-Object { -not (Test-Path $_) }
          if ($missing) {
            Write-Error "❌ Missing files: $($missing -join ', ')"
            exit 1
          }
          Compress-Archive -Path $items -DestinationPath dist/DeepSeek_API_Monitor_portable.zip
          Write-Host "✅ Portable ZIP created"

      - name: Extract version
        id: version
        run: |
          # Write a temp Python script to extract the version from pyproject.toml
          @'
          import re
          with open("pyproject.toml", encoding="utf-8") as f:
              content = f.read()
          m = re.search(r'version\s*=\s*"([^"]+)"', content)
          print(m.group(1) if m else "0.0.0")
          '@ | Set-Content -Path extract_version.py -Encoding UTF8
          $version = (python extract_version.py)
          Write-Host "Version: $version"
          echo "value=$version" >> $env:GITHUB_OUTPUT

      - name: Upload EXE & ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/DeepSeek_API_Monitor.exe
            dist/DeepSeek_API_Monitor_portable.zip
            dist/deepseek_config.ini.example
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 构建 Windows 安装包 (Inno Setup)
  # ═══════════════════════════════════════════════════════════════
  build-installer:
    needs: build-exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Verify downloaded EXE
        run: |
          if (-not (Test-Path dist/DeepSeek_API_Monitor.exe)) {
            Write-Error "❌ EXE not found in downloaded artifacts"
            exit 1
          }
          Write-Host "✅ EXE ready for installer packaging"

      - name: Install Inno Setup
        run: |
          Write-Host "Installing Inno Setup via Chocolatey..."
          choco install innosetup --no-progress -y --limit-output
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Failed to install Inno Setup"
            exit 1
          }
          Write-Host "✅ Inno Setup installed"

      - name: Locate ISCC compiler
        id: iscc
        run: |
          $paths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $found = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "❌ ISCC.exe not found in standard locations"
            Get-ChildItem -Path "C:\Program Files (x86)\Inno Setup 6\" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            Get-ChildItem -Path "C:\Program Files\Inno Setup 6\" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host "✅ ISCC found: $found"
          echo "path=$found" >> $env:GITHUB_OUTPUT

      - name: Build installer
        run: |
          & "${{ steps.iscc.outputs.path }}" installer/setup.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Inno Setup build failed (exit code: $LASTEXITCODE)"
            exit 1
          }
          Write-Host "✅ Installer built successfully"

      - name: Verify installer
        run: |
          $installers = Get-ChildItem dist/installer/*_Setup.exe -ErrorAction SilentlyContinue
          if (-not $installers) {
            Write-Error "❌ No installer EXE found in dist/installer/"
            Get-ChildItem dist/installer/ -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "✅ Installer: $($installers[0].Name) ($([math]::Round($installers[0].Length/1MB, 1)) MB)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/installer/*_Setup.exe
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # Job 3: 创建 GitHub Release + Gitee Release（国内镜像）
  # ═══════════════════════════════════════════════════════════════
  create-release:
    needs: [build-exe, build-installer]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: Flatten artifact structure
        run: |
          Write-Host "=== Artifacts downloaded ==="
          Get-ChildItem -Recurse release-files/ | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
            Write-Host "  $($_.FullName) ($($_.Length) bytes)"
          }

          # 将所有文件展平到 release-files/ 根目录
          Get-ChildItem -Recurse release-files/ -File | ForEach-Object {
            $dest = Join-Path "release-files" $_.Name
            if ($_.FullName -ne $dest) {
              Copy-Item $_.FullName $dest -Force
            }
          }
          Write-Host "=== Flattened ==="
          Get-ChildItem release-files/ -File | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeepSeek API Monitor ${{ github.ref_name }}
          body: |
            ## DeepSeek API 额度监控 ${{ github.ref_name }}

            ### 📦 下载

            - **安装包**: 下载 `*_Setup.exe`，一键安装（推荐 ✨）
              - 标准 Windows 安装向导，可选择安装路径
              - 创建开始菜单快捷方式和桌面快捷方式
              - 配置自动保存到 `%APPDATA%`，卸载时可选择保留
            - **便携版**: 下载 `DeepSeek_API_Monitor_portable.zip`，解压即用
              - 无需安装，配置保存在 EXE 同级目录

            ### ✨ 更新内容

            查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解完整更新日志。

            ### 📖 使用说明

            查看 [用户指南](https://github.com/${{ github.repository }}/blob/main/docs/USER_GUIDE_CN.md)。

            ### 🔧 系统要求

            - Windows 10/11
            - 无需安装 Python

            ---
            🤖 Generated with [Claude Code](https://claude.com/claude-code)
          files: |
            release-files/DeepSeek_API_Monitor.exe
            release-files/DeepSeek_API_Monitor_portable.zip
            release-files/*_Setup.exe
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 同步到 Gitee Release（国内用户满速下载）──────

      - name: Sync to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          OWNER="Rixinlouis"
          REPO="Deepseek-Usage"
          TAG="${{ github.ref_name }}"
          TOKEN="$GITEE_TOKEN"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases"

          # 1. 写同步脚本（避免复杂的 bash/python 内联转义）
          python3 -c "
import json, os, sys, urllib.request, urllib.error

OWNER = '${OWNER}'
REPO = '${REPO}'
TAG = '${TAG}'
TOKEN = os.environ['GITEE_TOKEN']
BASE = f'https://gitee.com/api/v5/repos/{OWNER}/{REPO}/releases'

body = '''## DeepSeek API 额度监控 ''' + TAG + '''

### 📦 下载

- **安装包**: 下载 \`*_Setup.exe\`，一键安装（推荐 ✨）
  - 标准 Windows 安装向导，可选择安装路径
  - 创建开始菜单快捷方式和桌面快捷方式
  - 配置自动保存到 \`%APPDATA%\`，卸载时可选择保留
- **便携版**: 下载 \`DeepSeek_API_Monitor_portable.zip\`，解压即用
  - 无需安装，配置保存在 EXE 同级目录

### ✨ 更新内容

查看 [CHANGELOG.md](https://gitee.com/''' + OWNER + '''/''' + REPO + '''/blob/main/CHANGELOG.md) 了解完整更新日志。

### 📖 使用说明

查看 [用户指南](https://gitee.com/''' + OWNER + '''/''' + REPO + '''/blob/main/docs/USER_GUIDE_CN.md)。

### 🔧 系统要求

- Windows 10/11
- 无需安装 Python'''

# Check existing release
print(f'Checking for existing release (tag={TAG})...')
req = urllib.request.Request(f'{BASE}?access_token={TOKEN}')
with urllib.request.urlopen(req) as r:
    releases = json.loads(r.read())
release_id = next((rel['id'] for rel in releases if rel.get('tag_name') == TAG), None)

if release_id:
    print(f'Release already exists (id={release_id})')
else:
    # Create release
    print('Creating Gitee release...')
    payload = json.dumps({
        'access_token': TOKEN,
        'tag_name': TAG,
        'name': f'DeepSeek API Monitor {TAG}',
        'body': body,
        'target_commitish': 'main',
        'prerelease': False
    }).encode()
    req = urllib.request.Request(BASE, data=payload, headers={'Content-Type': 'application/json'})
    with urllib.request.urlopen(req) as r:
        resp = json.loads(r.read())
    release_id = resp.get('id')
    print(f'Release created (id={release_id})')

if not release_id:
    print('❌ Failed to get release ID')
    sys.exit(1)

# Save release_id for later steps
with open('gitee_release_id.txt', 'w') as f:
    f.write(str(release_id))
print(f'release_id={release_id}')
"

          RELEASE_ID=$(cat gitee_release_id.txt)
          echo "Using release_id=${RELEASE_ID}"

          if [ -z "${RELEASE_ID}" ]; then
            echo "❌ Failed to get release ID (check GITEE_TOKEN permissions)"
            exit 1
          fi

          # 3. 上传构建产物
          echo "Uploading artifacts..."
          UPLOAD_URL="${API}/${RELEASE_ID}/attach_files?access_token=${TOKEN}"

          for f in release-files/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            # 跳过 GitHub 的 SHA 文件
            [[ "$fname" == *.sha256 ]] && continue
            echo "  Uploading ${fname} ($(du -h "$f" | cut -f1))..."

            for attempt in 1 2; do
              if curl -sS --fail-with-body -X POST "${UPLOAD_URL}" \
                -F "file=@${f}" \
                --connect-timeout 30 --max-time 600 2>&1; then
                echo "  ✅ ${fname}"
                break
              else
                if [ $attempt -eq 1 ]; then
                  echo "  ⚠️ Retry ${fname}..."
                  sleep 10
                else
                  echo "  ❌ ${fname} failed"
                fi
              fi
            done
          done

          echo "✅ Gitee Release synced"
          echo "🔗 https://gitee.com/${OWNER}/${REPO}/releases"
