name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 2.2.0)"
        required: true
        default: "2.2.0"

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: 构建 EXE 和便携版 ZIP
  # ═══════════════════════════════════════════════════════════════
  build-exe:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        run: |
          pip install pytest pytest-mock
          pytest tests/ -v --tb=short

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller DeepSeek_API_Monitor.spec

      - name: Verify EXE exists
        run: |
          if (Test-Path dist/DeepSeek_API_Monitor.exe) {
            Write-Host "EXE built successfully ($((Get-Item dist/DeepSeek_API_Monitor.exe).Length) bytes)"
          } else {
            Write-Error "EXE not found"
            exit 1
          }

      - name: Copy config template
        run: |
          Copy-Item deepseek_config.ini.example dist/deepseek_config.ini.example

      - name: Create portable ZIP
        run: |
          Compress-Archive -Path @("dist/DeepSeek_API_Monitor.exe", "dist/deepseek_config.ini.example") `
            -DestinationPath dist/DeepSeek_API_Monitor_portable.zip

      - name: Extract version
        id: version
        run: |
          @'
          import re
          with open("pyproject.toml", encoding="utf-8") as f:
              content = f.read()
          m = re.search(r'version\s*=\s*"([^"]+)"', content)
          print(m.group(1) if m else "0.0.0")
          '@ | Set-Content -Path extract_version.py -Encoding UTF8
          $version = (python extract_version.py)
          Write-Host "Version: $version"
          echo "value=$version" >> $env:GITHUB_OUTPUT

      - name: Upload EXE & ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/DeepSeek_API_Monitor.exe
            dist/DeepSeek_API_Monitor_portable.zip
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # Job 2: 构建 Windows 安装包 (Inno Setup)
  # ═══════════════════════════════════════════════════════════════
  build-installer:
    needs: build-exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Verify downloaded EXE
        run: |
          if (-not (Test-Path dist/DeepSeek_API_Monitor.exe)) {
            Write-Error "EXE not found in downloaded artifacts"
            exit 1
          }

      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y --limit-output

      - name: Locate ISCC compiler
        id: iscc
        run: |
          $paths = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $found = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            Write-Error "ISCC.exe not found"
            exit 1
          }
          echo "path=$found" >> $env:GITHUB_OUTPUT

      - name: Build installer
        run: |
          & "${{ steps.iscc.outputs.path }}" installer/setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/installer/*_Setup.exe
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # Job 3: 创建 GitHub Release
  # ═══════════════════════════════════════════════════════════════
  create-release:
    needs: [build-exe, build-installer]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: Flatten artifact structure
        run: |
          Get-ChildItem -Recurse release-files/ -File | ForEach-Object {
            $dest = Join-Path "release-files" $_.Name
            if ($_.FullName -ne $dest) {
              Copy-Item $_.FullName $dest -Force
            }
          }
          Get-ChildItem release-files/ -File | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem release-files/ -File | Where-Object { $_.Name -ne "SHA256SUMS.txt" }
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($f.Name)"
          }
          $lines | Out-File -FilePath release-files/SHA256SUMS.txt -Encoding utf8
          Get-Content release-files/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DeepSeek API Monitor ${{ github.ref_name || 'Manual' }}
          body: |
            ## DeepSeek API 额度监控

            ### 下载

            - **安装包** (`*_Setup.exe`): 双击运行（推荐 ✨）
            - **便携版** (`*_portable.zip`): 解压即用
            - `SHA256SUMS.txt`: 校验文件

            查看 [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解更新内容。
          files: |
            release-files/DeepSeek_API_Monitor.exe
            release-files/DeepSeek_API_Monitor_portable.zip
            release-files/*_Setup.exe
            release-files/SHA256SUMS.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
