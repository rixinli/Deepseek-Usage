name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/

      - name: Test with pytest
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # 源码镜像到 Gitee（测试通过后推送，仅 main 分支）
  # ═══════════════════════════════════════════════════════════════
  mirror-to-gitee:
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，确保 tags 可用

      - name: Push main branch to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          # 诊断：确认 token 是否注入
          if [ -z "${GITEE_TOKEN}" ]; then
            echo "[FAIL] GITEE_TOKEN is empty — secret not set?"
            exit 1
          fi
          echo "[INFO] GITEE_TOKEN length=${#GITEE_TOKEN}, first 4 chars=${GITEE_TOKEN:0:4}"

          git remote add gitee "https://gitee.com/Rixinlouis/Deepseek-Usage.git"

          # 方案 A: token 作为 username（OAuth 格式）
          echo "=== Trying token-as-username ==="
          git -c "credential.helper=!printf 'username=%s\\npassword=%s\\n' \"\$GITEE_TOKEN\" \"\$GITEE_TOKEN\"" \
            push gitee main --force && { echo "[OK]"; exit 0; }
          echo "[WARN] token-as-username failed"

          # 方案 B: token 作为 username，空密码
          echo "=== Trying token-as-username-empty-password ==="
          git -c "credential.helper=!printf 'username=%s\\npassword=\\n' \"\$GITEE_TOKEN\"" \
            push gitee main --force && { echo "[OK]"; exit 0; }
          echo "[WARN] token-as-username-empty-pw failed"

          # 方案 C: 标准 username + token
          echo "=== Trying Rixinlouis + token ==="
          git -c "credential.helper=!printf 'username=%s\\npassword=%s\\n' Rixinlouis \"\$GITEE_TOKEN\"" \
            push gitee main --force && { echo "[OK]"; exit 0; }
          echo "[WARN] Rixinlouis + token failed"

          echo "[FAIL] All auth methods exhausted for Gitee push"
          exit 1

      - name: Push tags to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          git -c "credential.helper=!printf 'username=%s\\npassword=%s\\n' Rixinlouis \"\$GITEE_TOKEN\"" \
            push gitee --tags --force
          echo "[OK] tags mirrored to Gitee"
