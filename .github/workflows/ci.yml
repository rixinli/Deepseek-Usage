name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/

      - name: Test with pytest
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # 源码镜像到 Gitee（测试通过后推送，仅 main 分支）
  # ═══════════════════════════════════════════════════════════════
  mirror-to-gitee:
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，确保 tags 可用

      - name: Push main branch to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          git remote add gitee "https://gitee.com/Rixinlouis/Deepseek-Usage.git"
          git -c "credential.helper=!printf 'username=%s\npassword=%s\n' Rixinlouis \"\$GITEE_TOKEN\"" \
            push gitee main --force
          echo "[OK] main branch mirrored to Gitee"

      - name: Push tags to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          git -c "credential.helper=!printf 'username=%s\npassword=%s\n' Rixinlouis \"\$GITEE_TOKEN\"" \
            push gitee --tags --force
          echo "[OK] tags mirrored to Gitee"
