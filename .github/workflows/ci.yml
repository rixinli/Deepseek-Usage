name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/

      - name: Test with pytest
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # 源码镜像到 Gitee（测试通过后推送，仅 main 分支）
  # ═══════════════════════════════════════════════════════════════
  mirror-to-gitee:
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，确保 tags 可用

      - name: Push main branch to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          echo "[INFO] GITEE_TOKEN length=${#GITEE_TOKEN}, first 4=${GITEE_TOKEN:0:4}"

          # 1. 用 API 验证 token 并获取登录名
          echo "=== Verifying token via Gitee API ==="
          USER_JSON=$(curl -s "https://gitee.com/api/v5/user?access_token=${GITEE_TOKEN}")
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/user?access_token=${GITEE_TOKEN}")
          echo "  HTTP ${HTTP_CODE}"
          # 从 JSON 提取 login 字段
          GITEE_LOGIN=$(echo "${USER_JSON}" | sed -n 's/.*"login"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          echo "  Gitee login from API: ${GITEE_LOGIN}"

          if [ -z "${GITEE_LOGIN}" ] || [ "${HTTP_CODE}" != "200" ]; then
            echo "[FAIL] Token invalid or cannot fetch user info"
            echo "  API response: ${USER_JSON}"
            exit 1
          fi

          # 2. 用 git credential store + 文件（最可靠方式）
          echo "=== Trying git credential store ==="
          git config --global credential.helper store
          echo "https://${GITEE_LOGIN}:${GITEE_TOKEN}@gitee.com" > ~/.git-credentials
          echo "https://${GITEE_LOGIN}:${GITEE_TOKEN}@gitee.com" > ~/_netrc
          chmod 600 ~/.git-credentials 2>/dev/null || true

          git remote add gitee "https://gitee.com/${GITEE_LOGIN}/Deepseek-Usage.git"
          git push gitee main --force && { echo "[OK] main mirrored to Gitee"; exit 0; }
          echo "[FAIL] git push failed — see error above"
          exit 1

      - name: Push tags to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        shell: bash
        run: |
          git push gitee --tags --force
          echo "[OK] tags mirrored to Gitee"
